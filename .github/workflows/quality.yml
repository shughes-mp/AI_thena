name: Quality and security

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: socratic-tutor
    env:
      AI_THENA_USE_LOCAL_DATABASE: "1"
      LOCAL_DATABASE_URL: file:./prisma/ci.db
      DATABASE_URL: file:./prisma/ci.db
      ANTHROPIC_API_KEY: ci-placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: socratic-tutor/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level high

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run tests
        run: pnpm test

      - name: Run lint
        run: pnpm lint

      - name: Check types
        run: pnpm typecheck

      - name: Build application
        run: pnpm build
